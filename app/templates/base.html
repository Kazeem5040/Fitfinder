<!DOCTYPE html>

<html>

<head>

<title>

FitFinder

</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">
<link rel="stylesheet", href="{{url_for('static', filename='css/main.css')}}">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<span class="navbar-brand">
FitFinder
</span>

<div>
{% if current_user.is_authenticated %}
<a class="btn btn-outline-light me-5" color="green" href="{{ url_for('gym.dashboard')}}">Dashboard</a>
<a class="btn btn-outline-light me-5" href="{{ url_for('auth.logout')}}">Logout</a>
{% else %}
<a class="btn btn-outline-light me-5" href="{{ url_for('auth.login')}}">Login</a>
<a class="btn btn-outline-light me-5" color="red" href="{{ url_for('auth.register')}}">Register</a>
{% endif %}



</div>

</div>

</nav>


{% block content %}

{% endblock %}

</div>

</body>

</html>
