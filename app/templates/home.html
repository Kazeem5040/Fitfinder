{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="row align-items-center">

        <div class="col-md-6">

            <h1 class="display-4 fw-bold">
                Find Gyms Near You
            </h1>

            <p class="lead text-muted mt-3">
                Discover gyms near your location and generate
                personalized workouts based on your goals,
                experience level, and available time.
            </p>

            <div class="mt-4">

                <a href="{{ url_for('auth.register') }}"
                   class="btn btn-danger btn-lg me-2">
                    Get Started
                </a>

                <a href="{{ url_for('auth.login') }}"
                   class="btn btn-outline-dark btn-lg">
                    Login
                </a>

            </div>

        </div>

        <div class="col-md-6 text-center">

            <img
            src="{{ url_for('static',
            filename='images/gym-hero.JPG') }}"
            class="img-fluid rounded shadow-lg hero-image">

        </div>

    </div>

</div>

{% endblock %}
